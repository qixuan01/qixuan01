  <rect width="860" height="280" fill="url(#scbg)" rx="12"/>
  <text x="430" y="32" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700" letter-spacing="1">全场景能源解决方案  ·  Full-Scenario Energy Solutions</text>

  <!-- Scenario 1: Zero-Carbon Home -->
  <rect x="20" y="50" width="190" height="205" rx="12" fill="url(#sc1)" opacity="0.9"/>
  <text x="115" y="90" text-anchor="middle" fill="white" font-size="30">🏠</text>
  <text x="115" y="115" text-anchor="middle" fill="white" font-size="14" font-weight="700">家庭零碳</text>
  <text x="115" y="133" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Zero-Carbon Home</text>
  <line x1="40" y1="145" x2="190" y2="145" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="115" y="165" text-anchor="middle" fill="#4ade80" font-size="12">☀ 光伏 8 kW</text>
  <text x="115" y="185" text-anchor="middle" fill="#4ade80" font-size="12">🔋 储能 16 kWh</text>
  <text x="115" y="205" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">自给率 &gt;80%</text>
  <text x="115" y="225" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">年省电费 5000+元</text>
  <text x="115" y="243" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">回收期 5-7年</text>

  <!-- Scenario 2: Villa -->
  <rect x="225" y="50" width="190" height="205" rx="12" fill="url(#sc2)" opacity="0.9"/>
  <text x="320" y="90" text-anchor="middle" fill="white" font-size="30">🏡</text>
  <text x="320" y="115" text-anchor="middle" fill="white" font-size="14" font-weight="700">别墅大宅</text>
  <text x="320" y="133" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Villa &amp; Large Residence</text>
  <line x1="245" y1="145" x2="395" y2="145" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="320" y="165" text-anchor="middle" fill="#60a5fa" font-size="12">☀ 光伏 16 kW</text>
  <text x="320" y="185" text-anchor="middle" fill="#60a5fa" font-size="12">🔋 储能 32 kWh</text>
  <text x="320" y="205" text-anchor="middle" fill="#60a5fa" font-size="12">🔌 充电 7 kW</text>
  <text x="320" y="225" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">V2G双向充放</text>
  <text x="320" y="243" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">年省电费 1.2万+元</text>

  <!-- Scenario 3: Commercial -->
  <rect x="430" y="50" width="190" height="205" rx="12" fill="url(#sc3)" opacity="0.9"/>
  <text x="525" y="90" text-anchor="middle" fill="white" font-size="30">🏭</text>
  <text x="525" y="115" text-anchor="middle" fill="white" font-size="14" font-weight="700">小型工商业</text>
  <text x="525" y="133" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Small C&amp;I</text>
  <line x1="450" y1="145" x2="600" y2="145" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="525" y="165" text-anchor="middle" fill="#fbbf24" font-size="12">☀ 光伏 25 kW</text>
  <text x="525" y="185" text-anchor="middle" fill="#fbbf24" font-size="12">🔋 储能 48 kWh</text>
  <text x="525" y="205" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">峰谷套利</text>
  <text x="525" y="225" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">年综合收益 3万+元</text>
  <text x="525" y="243" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">回收期 4-6年</text>

  <!-- Scenario 4: Integrated -->
  <rect x="635" y="50" width="205" height="205" rx="12" fill="url(#sc4)" opacity="0.9"/>
  <rect x="635" y="50" width="205" height="205" rx="12" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <text x="737" y="90" text-anchor="middle" fill="white" font-size="30">⚡</text>
  <text x="737" y="115" text-anchor="middle" fill="white" font-size="14" font-weight="700">光储充一体化</text>
  <text x="737" y="133" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Integrated Flagship</text>
  <line x1="655" y1="145" x2="820" y2="145" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="737" y="165" text-anchor="middle" fill="#c4b5fd" font-size="12">☀ 光伏 70 kW</text>
  <text x="737" y="185" text-anchor="middle" fill="#c4b5fd" font-size="12">🔋 储能 336 kWh</text>
  <text x="737" y="205" text-anchor="middle" fill="#c4b5fd" font-size="12">🔌 充电 300 kW</text>
  <text x="737" y="225" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">VPP接入 · 碳交易</text>
  <text x="737" y="243" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">年综合收益 60万+元</text>
</svg>
