<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/><stop offset="100%" style="stop-color:#1a3a2a"/>
    </linearGradient>
    <linearGradient id="gn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534"/><stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" fill="url(#bg)" rx="12"/>
  <text x="400" y="36" text-anchor="middle" fill="#4ade80" font-size="17" font-weight="700">⚡ StarKernal EC 储能逆变器  ·  Energy Storage Inverter</text>

  <!-- Device illustration -->
  <rect x="280" y="60" width="240" height="160" rx="16" fill="url(#gn)" opacity="0.9"/>
  <rect x="290" y="70" width="220" height="140" rx="10" fill="rgba(0,0,0,0.3)"/>
  <text x="400" y="118" text-anchor="middle" fill="white" font-size="36">⚡</text>
  <text x="400" y="148" text-anchor="middle" fill="white" font-size="16" font-weight="700">StarKernal EC</text>
  <text x="400" y="168" text-anchor="middle" fill="#4ade80" font-size="12">单相 3.0-6.0 kW  |  三相 5.0-30.0 kW</text>
  <text x="400" y="188" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">IP66 · 自然散热 · 200%过配</text>

  <!-- Left: PV input -->
  <rect x="40" y="100" width="110" height="60" rx="8" fill="#78350f" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="95" y="124" text-anchor="middle" fill="white" font-size="20">☀</text>
  <text x="95" y="146" text-anchor="middle" fill="#fbbf24" font-size="12">光伏输入 DC</text>
  <line x1="150" y1="130" x2="278" y2="140" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="275,136 283,140 275,144" fill="#f59e0b"/>

  <!-- Right: Battery -->
  <rect x="650" y="100" width="110" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="705" y="124" text-anchor="middle" fill="white" font-size="20">🔋</text>
  <text x="705" y="146" text-anchor="middle" fill="#60a5fa" font-size="12">储能电池 DC</text>
  <line x1="522" y1="140" x2="648" y2="130" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="525,136 517,140 525,144" fill="#3b82f6"/>
  <polygon points="645,126 653,130 645,134" fill="#3b82f6"/>

  <!-- Specs grid -->
  <rect x="30" y="250" width="740" height="70" rx="10" fill="rgba(0,0,0,0.3)"/>
  <text x="115" y="277" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="800">98.4%</text>
  <text x="115" y="297" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">最高转换效率</text>
  <line x1="210" y1="258" x2="210" y2="308" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="290" y="277" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="800">2-4路</text>
  <text x="290" y="297" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">MPPT通道</text>
  <line x1="375" y1="258" x2="375" y2="308" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="455" y="277" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="800">IP66</text>
  <text x="455" y="297" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">防护等级</text>
  <line x1="540" y1="258" x2="540" y2="308" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="620" y="277" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="800">200%</text>
  <text x="620" y="297" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">直流过配能力</text>
  <line x1="700" y1="258" x2="700" y2="308" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="750" y="277" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="800">自然</text>
  <text x="750" y="294" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="800">散热</text>
  <text x="750" y="309" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">免维护</text>
</svg>
