<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#147a3a"/>
      <stop offset="100%" style="stop-color:#1a9e4a"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="420" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#3aab60" font-size="16" font-weight="700" letter-spacing="2">光储充一体化系统架构 · AI全链路智能能源管理</text>

  <!-- ===== ROW 1: Energy Sources ===== -->
  <!-- Solar PV -->
  <rect x="40" y="60" width="130" height="80" rx="10" fill="url(#orangeGrad)" opacity="0.9"/>
  <text x="105" y="88" text-anchor="middle" fill="white" font-size="22">☀</text>
  <text x="105" y="110" text-anchor="middle" fill="white" font-size="13" font-weight="600">太阳能光伏</text>
  <text x="105" y="128" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">PV Array</text>

  <!-- AC Grid -->
  <rect x="730" y="60" width="130" height="80" rx="10" fill="url(#blueGrad)" opacity="0.9"/>
  <text x="795" y="88" text-anchor="middle" fill="white" font-size="22">⚡</text>
  <text x="795" y="110" text-anchor="middle" fill="white" font-size="13" font-weight="600">交流电网</text>
  <text x="795" y="128" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">AC Grid</text>

  <!-- ===== CENTER: Hybrid Inverter ===== -->
  <rect x="310" y="55" width="280" height="95" rx="12" fill="url(#greenGrad)" filter="url(#glow)"/>
  <text x="450" y="83" text-anchor="middle" fill="white" font-size="14" font-weight="700">🔄 StarKernal 混合逆变器</text>
  <text x="450" y="103" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">Hybrid Inverter  100-250 kW</text>
  <text x="450" y="121" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">DC/AC 双向转换 · 效率 98.4%+</text>
  <text x="450" y="139" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">IP66 · 200% 直流过配 · 10ms 并离网切换</text>

  <!-- Arrows: Solar → Inverter -->
  <line x1="170" y1="100" x2="308" y2="100" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="305,96 315,100 305,104" fill="#f59e0b"/>

  <!-- Arrows: Grid ↔ Inverter -->
  <line x1="592" y1="100" x2="728" y2="100" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="595,96 585,100 595,104" fill="#3b82f6"/>
  <polygon points="725,96 735,100 725,104" fill="#3b82f6"/>

  <!-- ===== ROW 2: Battery & Loads ===== -->
  <!-- Battery -->
  <rect x="40" y="210" width="130" height="90" rx="10" fill="#0f5a2e" stroke="#1a9e4a" stroke-width="1.5"/>
  <text x="105" y="240" text-anchor="middle" fill="white" font-size="22">🔋</text>
  <text x="105" y="262" text-anchor="middle" fill="white" font-size="12" font-weight="600">LiFePO₄ 储能电池</text>
  <text x="105" y="278" text-anchor="middle" fill="#3aab60" font-size="11">128-482 kWh</text>
  <text x="105" y="293" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">≥10000次循环 · IP66</text>

  <!-- EV Charger -->
  <rect x="730" y="210" width="130" height="90" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="795" y="240" text-anchor="middle" fill="white" font-size="22">🔌</text>
  <text x="795" y="262" text-anchor="middle" fill="white" font-size="12" font-weight="600">EVDC 充电桩</text>
  <text x="795" y="278" text-anchor="middle" fill="#60a5fa" font-size="11">12 / 25 kW · V2G</text>
  <text x="795" y="293" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">AI智能调度 · -40~70°C</text>

  <!-- AI Cloud Platform CENTER -->
  <rect x="290" y="195" width="320" height="120" rx="12" fill="rgba(22,163,74,0.15)" stroke="#1a9e4a" stroke-width="1.5"/>
  <text x="450" y="222" text-anchor="middle" fill="#3aab60" font-size="13" font-weight="700">📡 AI 智慧能源云平台</text>
  <text x="450" y="242" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">WiFi / 4G / 5G 实时连接</text>
  <!-- Feature pills -->
  <rect x="305" y="252" width="82" height="22" rx="11" fill="rgba(22,163,74,0.4)"/>
  <text x="346" y="267" text-anchor="middle" fill="white" font-size="10">🧠 AI调度</text>
  <rect x="395" y="252" width="82" height="22" rx="11" fill="rgba(22,163,74,0.4)"/>
  <text x="436" y="267" text-anchor="middle" fill="white" font-size="10">📊 数据分析</text>
  <rect x="485" y="252" width="82" height="22" rx="11" fill="rgba(22,163,74,0.4)"/>
  <text x="526" y="267" text-anchor="middle" fill="white" font-size="10">🔗 VPP虚拟电厂</text>
  <rect x="350" y="280" width="82" height="22" rx="11" fill="rgba(22,163,74,0.4)"/>
  <text x="391" y="295" text-anchor="middle" fill="white" font-size="10">📱 App远程运维</text>
  <rect x="440" y="280" width="82" height="22" rx="11" fill="rgba(22,163,74,0.4)"/>
  <text x="481" y="295" text-anchor="middle" fill="white" font-size="10">🔐 金融级安全</text>

  <!-- Arrows: Inverter → Battery -->
  <line x1="310" y1="155" x2="170" y2="210" stroke="#1a9e4a" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="174,207 168,217 178,215" fill="#1a9e4a"/>

  <!-- Arrows: Inverter → EV -->
  <line x1="590" y1="155" x2="730" y2="210" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="726,207 732,217 722,215" fill="#3b82f6"/>

  <!-- Arrows: Inverter ↔ Cloud -->
  <line x1="450" y1="150" x2="450" y2="193" stroke="#3aab60" stroke-width="2.5"/>
  <polygon points="446,190 450,198 454,190" fill="#3aab60"/>

  <!-- ===== ROW 3: KPI Stats ===== -->
  <rect x="25" y="330" width="850" height="70" rx="10" fill="rgba(0,0,0,0.3)"/>

  <!-- KPI items -->
  <text x="95" y="360" text-anchor="middle" fill="#3aab60" font-size="18" font-weight="800">98.4%</text>
  <text x="95" y="380" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">最高转换效率</text>

  <text x="215" y="360" text-anchor="middle" fill="#3aab60" font-size="18" font-weight="800">200%</text>
  <text x="215" y="380" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">直流过配能力</text>

  <text x="335" y="360" text-anchor="middle" fill="#3aab60" font-size="18" font-weight="800">10ms</text>
  <text x="335" y="380" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">并离网切换</text>

  <text x="455" y="360" text-anchor="middle" fill="#3aab60" font-size="18" font-weight="800">≥10000</text>
  <text x="455" y="380" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">电池循环寿命</text>

  <text x="575" y="360" text-anchor="middle" fill="#3aab60" font-size="18" font-weight="800">IP66</text>
  <text x="575" y="380" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">防护等级</text>

  <text x="695" y="360" text-anchor="middle" fill="#3aab60" font-size="18" font-weight="800">&gt;80%</text>
  <text x="695" y="380" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">能源自给率</text>

  <text x="815" y="360" text-anchor="middle" fill="#3aab60" font-size="18" font-weight="800">25dB</text>
  <text x="815" y="380" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">超静音运行</text>

  <!-- Dividers between KPIs -->
  <line x1="155" y1="340" x2="155" y2="390" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="275" y1="340" x2="275" y2="390" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="395" y1="340" x2="395" y2="390" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="515" y1="340" x2="515" y2="390" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="635" y1="340" x2="635" y2="390" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="755" y1="340" x2="755" y2="390" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
</svg>
