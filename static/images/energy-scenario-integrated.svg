<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/><stop offset="100%" style="stop-color:#0a1a14"/>
    </linearGradient>
    <linearGradient id="pu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/><stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="gn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534"/><stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="800" height="300" rx="12" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <text x="400" y="32" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="700">⚡ 光储充一体化解决方案  ·  Integrated Solar-Storage-Charging Flagship</text>

  <!-- Three main components -->
  <rect x="30" y="55" width="210" height="150" rx="12" fill="rgba(120,53,15,0.4)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="135" y="100" text-anchor="middle" fill="white" font-size="32">☀</text>
  <text x="135" y="128" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">光伏阵列</text>
  <text x="135" y="150" text-anchor="middle" fill="white" font-size="20" font-weight="800">70 kW</text>
  <text x="135" y="170" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">单晶硅组件</text>
  <text x="135" y="187" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">年发电 ~90,000度</text>
  <line x1="240" y1="130" x2="295" y2="130" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="293,125 302,130 293,135" fill="#f59e0b"/>

  <rect x="295" y="55" width="210" height="150" rx="12" fill="rgba(22,163,74,0.2)" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" fill="white" font-size="32">🔋</text>
  <text x="400" y="128" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">储能系统</text>
  <text x="400" y="150" text-anchor="middle" fill="white" font-size="20" font-weight="800">336 kWh</text>
  <text x="400" y="170" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">BAT 10.0 × 37台</text>
  <text x="400" y="187" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">含VPP虚拟电厂接入</text>
  <line x1="505" y1="130" x2="560" y2="130" stroke="#4ade80" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="558,125 567,130 558,135" fill="#4ade80"/>

  <rect x="560" y="55" width="210" height="150" rx="12" fill="rgba(30,58,95,0.6)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="665" y="100" text-anchor="middle" fill="white" font-size="32">🔌</text>
  <text x="665" y="128" text-anchor="middle" fill="#60a5fa" font-size="15" font-weight="700">充电站</text>
  <text x="665" y="150" text-anchor="middle" fill="white" font-size="20" font-weight="800">300 kW</text>
  <text x="665" y="170" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">EVDC 25kW × 12台</text>
  <text x="665" y="187" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">V2G双向 · 充电服务收益</text>

  <!-- Bottom economics -->
  <rect x="30" y="220" width="740" height="60" rx="10" fill="rgba(124,58,237,0.15)" stroke="#a78bfa" stroke-width="1"/>
  <text x="140" y="244" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">充电服务年收入</text>
  <text x="140" y="264" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">30~50万元</text>
  <line x1="245" y1="227" x2="245" y2="273" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="340" y="244" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">峰谷套利年收益</text>
  <text x="340" y="264" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">15~25万元</text>
  <line x1="435" y1="227" x2="435" y2="273" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="530" y="244" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">VPP调频收益</text>
  <text x="530" y="264" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">5~10万元</text>
  <line x1="625" y1="227" x2="625" y2="273" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="712" y="244" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">投资回收期</text>
  <text x="712" y="264" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">4~6年</text>
</svg>
