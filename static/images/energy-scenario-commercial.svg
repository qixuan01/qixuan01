<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f00"/><stop offset="100%" style="stop-color:#0f1a0a"/>
    </linearGradient>
    <linearGradient id="or" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f"/><stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)" rx="12"/>
  <text x="400" y="32" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700">🏭 小型工商业解决方案  ·  Small C&amp;I Solution</text>

  <!-- Factory icon -->
  <rect x="40" y="55" width="200" height="150" rx="12" fill="url(#or)" opacity="0.85"/>
  <text x="140" y="105" text-anchor="middle" font-size="48">🏭</text>
  <text x="140" y="138" text-anchor="middle" fill="white" font-size="13" font-weight="600">工厂 / 商铺</text>
  <text x="140" y="158" text-anchor="middle" fill="#fbbf24" font-size="11">峰谷套利首选</text>
  <text x="140" y="178" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">削峰填谷降电费</text>

  <!-- Specs -->
  <rect x="260" y="55" width="500" height="80" rx="10" fill="rgba(0,0,0,0.3)"/>
  <text x="345" y="82" text-anchor="middle" fill="#fbbf24" font-size="20">☀</text>
  <text x="345" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">25 kW</text>
  <text x="345" y="122" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">光伏系统</text>
  <line x1="420" y1="63" x2="420" y2="127" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="510" y="82" text-anchor="middle" fill="#4ade80" font-size="20">🔋</text>
  <text x="510" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">48 kWh</text>
  <text x="510" y="122" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">储能系统</text>
  <line x1="600" y1="63" x2="600" y2="127" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="685" y="82" text-anchor="middle" fill="#f59e0b" font-size="20">⚡</text>
  <text x="685" y="100" text-anchor="middle" fill="white" font-size="13" font-weight="700">EC 25kW</text>
  <text x="685" y="118" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">三相逆变器</text>
  <line x1="750" y1="63" x2="750" y2="127" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="775" y="92" text-anchor="middle" fill="#4ade80" font-size="11">VPP</text>
  <text x="775" y="108" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">可选</text>

  <!-- Peak-valley arbitrage model -->
  <rect x="260" y="150" width="500" height="55" rx="10" fill="rgba(251,191,36,0.1)" stroke="#f59e0b" stroke-width="1"/>
  <text x="355" y="172" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">每日套利电量</text>
  <text x="355" y="190" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">~40度/天</text>
  <line x1="430" y1="157" x2="430" y2="198" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="510" y="172" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">套利年收益</text>
  <text x="510" y="190" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">1.4万+元</text>
  <line x1="590" y1="157" x2="590" y2="198" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="660" y="172" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">综合年收益</text>
  <text x="660" y="190" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">3万+元</text>
  <line x1="730" y1="157" x2="730" y2="198" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="765" y="180" text-anchor="middle" fill="#fbbf24" font-size="12">4~6年</text>

  <rect x="40" y="222" width="720" height="58" rx="8" fill="rgba(0,0,0,0.3)"/>
  <text x="400" y="244" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">峰谷价差套利模型：低谷充电（0.3元/度）→ 高峰放电（1.3元/度）</text>
  <text x="400" y="263" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">AI自动识别低谷时段 · 关键设备不间断备电 · 25年系统寿命正收益</text>
</svg>
