<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/><stop offset="100%" style="stop-color:#1a2a3a"/>
    </linearGradient>
    <linearGradient id="gn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534"/><stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" fill="url(#bg)" rx="12"/>
  <text x="400" y="36" text-anchor="middle" fill="#4ade80" font-size="17" font-weight="700">🔄 StarKernal Hybrid 混合逆变器  ·  Hybrid Inverter</text>

  <!-- Highlight badges -->
  <rect x="60" y="60" width="150" height="60" rx="10" fill="url(#gn)"/>
  <text x="135" y="88" text-anchor="middle" fill="white" font-size="22" font-weight="800">99.0%</text>
  <text x="135" y="108" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">最高转换效率</text>

  <rect x="230" y="60" width="150" height="60" rx="10" fill="#166534" stroke="#22c55e" stroke-width="1.5"/>
  <text x="305" y="88" text-anchor="middle" fill="white" font-size="22" font-weight="800">25dB</text>
  <text x="305" y="108" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">超静音运行</text>

  <rect x="420" y="60" width="150" height="60" rx="10" fill="url(#gn)"/>
  <text x="495" y="88" text-anchor="middle" fill="white" font-size="22" font-weight="800">200%</text>
  <text x="495" y="108" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">直流过配能力</text>

  <rect x="590" y="60" width="150" height="60" rx="10" fill="#166534" stroke="#22c55e" stroke-width="1.5"/>
  <text x="665" y="88" text-anchor="middle" fill="white" font-size="22" font-weight="800">98mm</text>
  <text x="665" y="108" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">超薄机身</text>

  <!-- Series info -->
  <rect x="60" y="145" width="320" height="90" rx="10" fill="rgba(22,163,74,0.15)" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="170" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">单相系列</text>
  <text x="220" y="192" text-anchor="middle" fill="white" font-size="12">2.0 / 3.0 / 3.6 / 4.0 / 4.6 / 5.0 / 6.0 kW</text>
  <text x="220" y="212" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">MPPT 范围: 50-550V</text>
  <text x="220" y="227" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">支持 1-6 台 BAT 并联扩展</text>

  <rect x="420" y="145" width="320" height="90" rx="10" fill="rgba(22,163,74,0.15)" stroke="#22c55e" stroke-width="1"/>
  <text x="580" y="170" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">三相系列</text>
  <text x="580" y="192" text-anchor="middle" fill="white" font-size="12">3.0 / 4.0 / 5.0 / 6.0 / 8.0 / 10.0 / 12.0 kW</text>
  <text x="580" y="212" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">MPPT 范围: 160-1000V</text>
  <text x="580" y="227" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">待机功耗仅 2.5W</text>

  <!-- Interface info -->
  <rect x="30" y="255" width="740" height="65" rx="10" fill="rgba(0,0,0,0.3)"/>
  <text x="160" y="278" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">通信接口</text>
  <text x="160" y="298" text-anchor="middle" fill="white" font-size="14" font-weight="600">WLAN / FE / RS485</text>
  <line x1="300" y1="262" x2="300" y2="308" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="430" y="278" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">防护等级</text>
  <text x="430" y="298" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600">IP66 全天候</text>
  <line x1="560" y1="262" x2="560" y2="308" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="670" y="278" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">电池连接</text>
  <text x="670" y="298" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600">最多6台并联</text>
</svg>
