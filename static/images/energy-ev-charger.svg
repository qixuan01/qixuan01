<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1a2e"/><stop offset="100%" style="stop-color:#0a1f14"/>
    </linearGradient>
    <linearGradient id="gn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534"/><stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="bl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/><stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" fill="url(#bg)" rx="12"/>
  <text x="400" y="36" text-anchor="middle" fill="#4ade80" font-size="17" font-weight="700">🔌 StarKernal EVDC 直流充电桩  ·  V2G 车网双向互动</text>

  <!-- V2G diagram center -->
  <circle cx="400" cy="155" r="65" fill="url(#gn)" opacity="0.9"/>
  <text x="400" y="140" text-anchor="middle" fill="white" font-size="28">🔌</text>
  <text x="400" y="163" text-anchor="middle" fill="white" font-size="14" font-weight="700">EVDC</text>
  <text x="400" y="181" text-anchor="middle" fill="#4ade80" font-size="11">12 / 25 kW</text>

  <!-- Left: EV Car -->
  <rect x="40" y="110" width="230" height="90" rx="12" fill="url(#bl)" opacity="0.9"/>
  <text x="155" y="144" text-anchor="middle" fill="white" font-size="28">🚗</text>
  <text x="155" y="167" text-anchor="middle" fill="white" font-size="13" font-weight="600">电动汽车</text>
  <text x="155" y="185" text-anchor="middle" fill="#60a5fa" font-size="11">移动储能单元</text>
  <!-- bidirectional arrow -->
  <line x1="272" y1="155" x2="334" y2="155" stroke="#4ade80" stroke-width="3"/>
  <polygon points="270,150 280,155 270,160" fill="#4ade80"/>
  <polygon points="336,150 326,155 336,160" fill="#4ade80"/>
  <text x="303" y="148" text-anchor="middle" fill="#4ade80" font-size="10">V2G</text>

  <!-- Right: Grid -->
  <rect x="530" y="110" width="230" height="90" rx="12" fill="#78350f" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="645" y="144" text-anchor="middle" fill="white" font-size="28">⚡</text>
  <text x="645" y="167" text-anchor="middle" fill="white" font-size="13" font-weight="600">电网 / VPP</text>
  <text x="645" y="185" text-anchor="middle" fill="#fbbf24" font-size="11">调峰调频收益</text>
  <line x1="466" y1="155" x2="528" y2="155" stroke="#f59e0b" stroke-width="3"/>
  <polygon points="464,150 474,155 464,160" fill="#f59e0b"/>
  <polygon points="530,150 520,155 530,160" fill="#f59e0b"/>

  <!-- Feature pills -->
  <rect x="60" y="225" width="160" height="38" rx="19" fill="rgba(22,163,74,0.2)" stroke="#22c55e" stroke-width="1"/>
  <text x="140" y="241" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">🔄 V2X 车网互动</text>
  <text x="140" y="256" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">双向能量流动</text>

  <rect x="235" y="225" width="160" height="38" rx="19" fill="rgba(22,163,74,0.2)" stroke="#22c55e" stroke-width="1"/>
  <text x="315" y="241" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">⚡ 即插即充</text>
  <text x="315" y="256" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">RFID/App/LED</text>

  <rect x="410" y="225" width="160" height="38" rx="19" fill="rgba(22,163,74,0.2)" stroke="#22c55e" stroke-width="1"/>
  <text x="490" y="241" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">🧠 AI智能调度</text>
  <text x="490" y="256" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">低谷充电最优策略</text>

  <rect x="585" y="225" width="155" height="38" rx="19" fill="rgba(22,163,74,0.2)" stroke="#22c55e" stroke-width="1"/>
  <text x="662" y="241" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">🛡️ IP66防护</text>
  <text x="662" y="256" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">-40°C ~ 70°C</text>

  <!-- Bottom bar -->
  <rect x="30" y="278" width="740" height="40" rx="8" fill="rgba(0,0,0,0.3)"/>
  <text x="400" y="295" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">低谷充电 · 高峰放电 · 参与VPP虚拟电厂 · 每年节省电费数千元</text>
  <text x="400" y="311" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">12kW 版本  |  25kW 版本  —  两种功率，灵活选配</text>
</svg>
