[params]
# 基本参数
description = "深圳市启煊软件有限公司是一家专注于大数据基础设施、AI教育、边缘AI推理的科技企业，坚持自主研发、全栈可控的技术路线。核心产品线覆盖大数据智能运维、AI教育创新、边缘AI推理加速、智能终端中间件四大领域，80,000+行全栈自主代码，Apache Ambari生态、RISC-V+FPGA异构计算、AI数字人教育技术路线"
author = "深圳市启煊软件有限公司"

# SEO优化
keywords = "大数据运维,HadoopForge,Apache Ambari,Hadoop集群管理,AI教育,悦学智伴,边缘AI推理,BitNet,FPGA加速器,RISC-V,智能终端,国产替代,信创,启煊软件"
robots = "index,follow"

# Open Graph / 社交媒体分享
[params.og]
  siteName = "深圳市启煊软件有限公司"
  locale = "zh_CN"
  type = "website"
  image = "images/logo.png"

# 分析工具 (可选配置)
# googleAnalytics = "G-XXXXXXXXXX"  # 替换为实际的Google Analytics ID
# baiduAnalytics = "xxxxxxxxxxxxxxxx"  # 替换为实际的百度统计ID

# 社交媒体
[params.social]
  email = "axel@qixuan.vip"
  phone = "18923719468"
  address = "深圳市龙岗区龙城街道龙平西路28号龙平西路28号"
  wechat = "深圳市启煊软件有限公司"

# 公司信息
[params.company]
  name = "深圳市启煊软件有限公司"
  legalName = "深圳市启煊软件有限公司"
  foundingDate = "2020"
  logo = "images/logo.png"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      autoHeadingID = true
      autoHeadingIDType = "github"
    [markup.goldmark.extensions]
      linkify = true
      strikethrough = true
      table = true
      taskList = true

# URL处理配置
canonifyURLs = true
relativeURLs = false

# 忽略警告
ignoreLogs = ['warning-partial-superfluous-prefix']

# 性能优化
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false

# 缓存配置
[caches]
  [caches.getjson]
    dir = ":cacheDir/:project"
    maxAge = "10m"
  [caches.getcsv]
    dir = ":cacheDir/:project"
    maxAge = "10m"
  [caches.images]
    dir = ":resourceDir/_gen"
    maxAge = "720h"
  [caches.assets]
    dir = ":resourceDir/_gen"
    maxAge = "720h"